spring.application.name=feeltrack-backend

# Database connection configuration
spring.datasource.url=jdbc:mariadb://localhost:3307/sa
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --------------------------------------------------------------------
# Hibernate dialect: informs Hibernate about the exact type of database
# used in order to generate compatible SQL.
# - MariaDBDialect: for MariaDB/MySQL
# - H2Dialect: for H2 database (often used in tests)
# Hibernate documentation reference: https://docs.jboss.org/hibernate/orm/6.3/userguide/html_single/Hibernate_User_Guide.html#appendices-sql-dialects
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# --------------------------------------------------------------------
# Defers datasource initialization (data.sql / schema.sql)
# until Hibernate has created the tables. Useful to:
# - Avoid "table not found" errors if data.sql runs too early
# - Deployments on a real database (MariaDB, Postgres, etc.)
# For H2 tests, it can be disabled because ddl-auto=create-drop
# already creates tables before inserting data.
# Spring Boot documentation reference: https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html#application-properties.spring.jpa.defer-datasource-initialization
spring.jpa.defer-datasource-initialization=true

# Disables automatic naming strategy conversions from Spring Boot/Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Global API base path prefix
server.servlet.context-path=/api

# Allowed origins list
app.cors.allowed-origins=http://localhost:**

# --------------------------------------------------------------------

# ==== Logging configuration ====

# Default global log level
logging.level.root=WARN
# Log level for custom application package
logging.level.ld.feeltrack_backend.config=INFO

# Force console output with syntax highlighting
spring.output.ansi.enabled=ALWAYS

# Spring Boot startup informational logs
logging.level.org.springframework.boot=INFO

# Hibernate: show only critical errors
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN

# Disable SQL logs
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# --------------------------------------------------------------------

# ==== Actuator configuration ====

# Expose only useful endpoints
management.endpoints.web.exposure.include=health

# Show health details (DB, disk, etc.)
management.endpoint.health.show-details=always

# --------------------------------------------------------------------

# Sentiment analysis API configuration (HuggingFace)
huggingface.token=${HUGGINGFACE_TOKEN}